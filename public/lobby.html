<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Tables - 8th District</title>
  <style>
    :root {
      --bg-base: #0b0b0e; --bg-card: #151518; --border-color: #27272a;
      --text-main: #f3f4f6; --text-muted: #9ca3af; --accent-yellow: #facc15;
      --badge-open-bg: #064e3b; --badge-open-text: #34d399;
      --badge-locked-bg: #451a1a; --badge-locked-text: #f87171;
      --badge-inactive-bg: #374151; --badge-inactive-text: #d1d5db;
    }

    body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 0; }
    
    .header-container { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .header-left h1 { margin: 0; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .header-left p { margin: 0; color: var(--text-muted); font-size: 15px; }

    .btn-new-table { background: transparent; color: var(--badge-open-text); border: 1px solid var(--badge-open-bg); padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-new-table:hover { background: var(--badge-open-bg); }

    .table-list { max-width: 1000px; margin: 0 auto 50px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); }

    .table-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; text-align: left; display: flex; flex-direction: column; gap: 12px; }
    .card-header { display: flex; align-items: center; gap: 12px; }
    .card-header h3 { margin: 0; font-size: 20px; font-weight: 600; text-transform: uppercase; }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge-open { background: var(--badge-open-bg); color: var(--badge-open-text); }
    .badge-locked { background: var(--badge-locked-bg); color: var(--badge-locked-text); }
    .badge-inactive { background: var(--badge-inactive-bg); color: var(--badge-inactive-text); }

    .card-intro { margin: 0; color: var(--accent-yellow); font-style: italic; font-size: 15px; }
    .card-meta { display: flex; align-items: center; gap: 20px; color: var(--text-muted); font-size: 14px; margin-top: 4px; margin-bottom: 8px; }
    .meta-item { display: flex; align-items: center; gap: 6px; }
    .meta-icon { width: 16px; height: 16px; fill: currentColor; }

    .card-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { padding: 10px 24px; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; text-decoration: none; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background-color: var(--accent-yellow); color: #111827; }
    .btn-secondary { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
    .btn-outline { background-color: transparent; color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
    .btn-disabled { background-color: #374151; color: #9ca3af; cursor: not-allowed; }
    .btn-icon { width: 18px; height: 18px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="header-left">
      <h1>Game Tables</h1>
      <p>Join, watch, reserve seats, or start your own</p>
    </div>
    <button class="btn-new-table" id="createBtn" onclick="location.href='table-test.html?create=1'">New Table</button>
  </div>

  <div class="table-list" id="tables">
    <div class="empty-state">Loading tables...</div>
  </div>

  <script type="module">
    const ICONS = {
      players: `<svg class="meta-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>`,
      watchers: `<svg class="meta-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`,
      queue: `<svg class="meta-icon" viewBox="0 0 24 24"><path d="M22 10V6c0-1.1-.9-2-2-2H4c-1.1 0-1.99.9-1.99 2v4c1.1 0 1.99.9 1.99 2s-.89 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2zm-2-1.46c-1.19.69-2 1.99-2 3.46s.81 2.77 2 3.46V18H4v-2.54c1.19-.69 2-1.99 2-3.46s-.81-2.77-2-3.46V6h16v2.54z"/></svg>`,
      join: `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>`,
      seat: `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M4 18v3h3v-3h10v3h3v-6H4v3zm15-8h3v3h-3v-3zM2 10h3v3H2v-3zm15 3H7V5c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v8z"/></svg>`
    };

    function getTableStatus(metadata) {
      if (!metadata) return { text: "UNKNOWN", class: "badge-inactive" };
      if (metadata.hostName === "Inactive - No Host") return { text: "INACTIVE", class: "badge-inactive" };
      if (metadata.isPrivate) return { text: "PRIVATE", class: "badge-locked" };
      if (metadata.gameStarted || metadata.playerSeats >= metadata.maxPlayers) return { text: "LOCKED", class: "badge-locked" };
      return { text: "OPEN", class: "badge-open" };
    }

    async function loadTables() {
      const box = document.getElementById("tables");

      try {
        // THE FIX: Fetch directly from the Monitor API to bypass SDK issues
        const response = await fetch("https://eightth-district-domino.onrender.com/api/rooms");
        
        if (!response.ok) {
            throw new Error(`Server returned status: ${response.status}`);
        }

        let rooms = await response.json();
        
        // Filter to make sure we only show our Dominoes rooms
        rooms = rooms.filter(room => room.name === "table");

        if (!rooms || !rooms.length) {
          box.innerHTML = `<div class="empty-state">No open tables yet. Create one to start the district.</div>`;
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const currentMode = params.get("mode");

        box.innerHTML = "";

        rooms.forEach(room => {
          const m = room.metadata || {};
          
          if (currentMode === "noFive" && m.scoringMode !== "noFive") return;
          if (currentMode === "allFives" && m.scoringMode !== "standard") return;

          const tableName = m.tableName || m.tableId || room.roomId;
          const hostIntro = m.hostIntro || "District Fives. Standard Rules.";
          
          const seats = m.playerSeats ?? 0;
          const max = m.maxPlayers ?? 4;
          const watchers = m.spectators ?? 0;
          const queue = m.queue ?? 0;
          const isFull = seats >= max;

          const status = getTableStatus(m);

          let primaryButton = "";
          let reserveButton = "";

          if (isFull || m.gameStarted || status.text === "INACTIVE") {
            primaryButton = `<button class="btn btn-disabled" onclick="location.href='table-test.html?roomId=${room.roomId}'">
              ${ICONS.seat} Seats Full
            </button>`;
            
            if (status.text !== "INACTIVE") {
              reserveButton = `<button class="btn btn-outline" onclick="location.href='table-test.html?roomId=${room.roomId}&action=reserve'">
                ${ICONS.queue} Reserve Seat
              </button>`;
            }
          } else {
            primaryButton = `<button class="btn btn-primary" onclick="location.href='table-test.html?roomId=${room.roomId}&action=join'">
              ${ICONS.join} Join as Player
            </button>`;
          }

          const watchButton = `<button class="btn btn-secondary" onclick="location.href='table-test.html?roomId=${room.roomId}&action=watch'">
            ${ICONS.watchers} Watch
          </button>`;

          const card = document.createElement("div");
          card.className = "table-card";

          const scoringTxt = m.scoringMode === "noFive" ? "No 5's: 10, 15, 20+ count" : "Count 5: 5, 10, 15, 20+ count";
          const drawTxt = m.drawRule === "drawAndPass" ? "Draw and Pass (1 tile max)" : "Draw until playable";

          card.innerHTML = `
            <div class="card-header">
              <h3>${tableName}</h3>
              <span class="badge ${status.class}">${status.text}</span>
            </div>
            <p class="card-intro">"${hostIntro}"</p>
            <div class="card-meta">
              <div class="meta-item" title="Players Seated">${ICONS.players} ${seats}/${max} players</div>
              <div class="meta-item" title="Spectators">${ICONS.watchers} ${watchers} watching</div>
              ${queue > 0 ? `<div class="meta-item" title="Queue">${ICONS.queue} ${queue} reserved</div>` : ''}
            </div>
            <div class="tableRules" style="margin-bottom: 15px;">
              <div><strong>Rules:</strong> All Fives</div>
              <div><strong>Scoring:</strong> ${scoringTxt}</div>
              <div><strong>Drawing:</strong> ${drawTxt}</div>
            </div>
            <div class="card-actions">
              ${primaryButton}
              ${watchButton}
              ${reserveButton}
            </div>
          `;
          box.appendChild(card);
        });
        
        if (box.innerHTML === "") {
            box.innerHTML = `<div class="empty-state">No tables available for this game mode. Be the first to create one!</div>`;
        }

      } catch (err) {
        console.error(err);
        box.innerHTML = `<div class="empty-state" style="color: #f87171;">Could not connect to the matchmaking server. Ensure your Render backend is running.</div>`;
      }
    }

    loadTables();
    setInterval(loadTables, 5000);
  </script>
</body>
</html>
